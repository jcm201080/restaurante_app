{% extends "base_admin.html" %}

{% block title %}Admin - Productos{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}?v={{ timestamp }}">
{% endblock %}

{% block content %}

<div class="container">

    <h1>⚙️ Gestión de productos</h1>
    <form method="POST" action="/admin/reset_disponibles">
        <button class="btn" onclick="return confirm('⚠️ Esto marcará todos los productos como disponibles. ¿Continuar?')">
            🔄 Reset productos visibilidad
        </button>
    </form>

    <div class="filtro-card card-ancho">

        <form method="GET" class="filtro-form">

            <label>🔍 Filtrar por categoría</label>

            <select class="input_productos" name="categoria" onchange="this.form.submit()">
                <option value="">Todas</option>
                {% for c in categorias %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
            </select>

        </form>

    </div>

    <!-- ➕ AÑADIR PRODUCTO -->

    <form method="POST" action="/admin/add" class="card card-ancho" enctype="multipart/form-data">

        <input class="input_productos" type="text" name="nombre" placeholder="Nombre" required>

        <input class="input_productos" type="number" step="0.01" name="precio" placeholder="Precio" required>

        <!-- 📂 CATEGORÍA -->
        <select name="categoria" required>
            <option value="">Categoría</option>
            {% for c in categorias %}
            <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
        </select>

        <!-- 🍽️ TIPO -->
        <select name="tipo" required>
            <option value="">Tipo</option>
            {% for t in tipos %}
            <option value="{{ t }}">{{ t|capitalize }}</option>
            {% endfor %}
        </select>
        <input type="file" name="imagen">

        <button type="submit" class="btn">➕ Añadir producto</button>

    </form>

    <hr class="hr-class">

    <!-- 📋 LISTA DE PRODUCTOS -->
    {% for p in productos %}
    <form method="POST" action="/admin/update/{{ p.id }}" class="card card-ancho" enctype="multipart/form-data">

        <input class="input_productos" type="text" name="nombre" value="{{ p.nombre }}">
        <input class="input_productos" type="number" step="0.01" name="precio" value="{{ p.precio }}">

        <!-- seleccionar categoria -->
        <select name="categoria">
            <option value="">None</option>
            {% for c in categorias %}
            <option value="{{ c }}" {% if p.categoria==c %}selected{% endif %}>
                {{ c }}
            </option>
            {% endfor %}
        </select>
        <!-- seleccionar tipo -->
        <select name="tipo">
            <option value="">None</option>
            {% for t in tipos %}
            <option value="{{ t }}" {% if p.tipo==t %}selected{% endif %}>
                {{ t }}
            </option>
            {% endfor %}
        </select>


        {% if p.imagen %}
        <img src="{{ url_for('static', filename='uploads/' + p.imagen) }}" width="80">
        {% endif %}

        <!-- cambiar imagen -->
        <input type="file" name="imagen">

        <div class="toggles">
            <label>⭐ <input type="checkbox" name="destacado" {% if p.destacado %}checked{% endif %}></label>
            <label>🍽️ <input type="checkbox" name="plato_dia" {% if p.plato_dia %}checked{% endif %}></label>
            <label>🚫 <input type="checkbox" name="fuera_carta" {% if p.fuera_carta %}checked{% endif %}></label>
            <label>👁️ <input type="checkbox" name="disponible" {% if p.disponible %}checked{% endif %}></label>
        </div>

        <!-- 🔥 BOTONES JUNTOS -->
        <div class="acciones">
            <button type="submit" name="action" value="guardar" class="btn">💾 Guardar</button>

            <button type="submit" name="action" value="eliminar" class="btn danger"
                onclick="return confirm('¿Eliminar producto?')">
                🗑️ Eliminar
            </button>
        </div>

    </form>

    {% endfor %}

</div>

{% endblock %}
